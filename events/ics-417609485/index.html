,\"format\":0,\"version\":1},{\"mode\":\"normal\",\"text\":\"CTFF-0059\",\"type\":\"text\",\"style\":\"\",\"detail\":0,\"format\":1,\"version\":1},{\"mode\":\"normal\",\"text\":\".\",\"type\":\"text\",\"style\":\"\",\"detail\":0,\"format\":0,\"version\":1}],\"direction\":null,\"textStyle\":\"\",\"textFormat\":0},{\"type\":\"paragraph\",\"format\":\"start\",\"indent\":0,\"version\":1,\"children\":[{\"mode\":\"normal\",\"text\":\"A Faia Brava nasceu com a missão de criar espaços para a Natureza. Foi pioneira no reconhecimento como primeira área protegida privada de Portugal, demonstrando que conservação, sustentabilidade e respeito pelo território são possíveis com iniciativa cidadã.\",\"type\":\"text\",\"style\":\"\",\"detail\":0,\"format\":0,\"version\":1}],\"direction\":null,\"textStyle\":\"\",\"textFormat\":0},{\"type\":\"paragraph\",\"format\":\"start\",\"indent\":0,\"version\":1,\"children\":[{\"mode\":\"normal\",\"text\":\"Localizada no Vale do Côa, a reserva estende-se por centenas de hectares de paisagens dominadas por escarpas, sobreiros e olivais mediterrânicos, parte integrante da rede Natura 2000 e classificada como IBA — um refúgio para aves rupícolas e biodiversidade notável.\",\"type\":\"text\",\"style\":\"\",\"detail\":0,\"format\":0,\"version\":1}],\"direction\":null,\"textStyle\":\"\",\"textFormat\":0},{\"type\":\"paragraph\",\"format\":\"start\",\"indent\":0,\"version\":1,\"children\":[{\"mode\":\"normal\",\"text\":\"Ao longo destas duas décadas e meia, a Faia Brava tem-se destacado por conservação e restauro ecológico, reflorestação, proteção de espécies ameaçadas, e por promover a visitação responsável e a educação ambiental — criando simultaneamente valor ambiental, social e cultural.\",\"type\":\"text\",\"style\":\"\",\"detail\":0,\"format\":0,\"version\":1}],\"direction\":null,\"textStyle\":\"\",\"textFormat\":0},{\"type\":\"paragraph\",\"format\":\"start\",\"indent\":0,\"version\":1,\"children\":[{\"mode\":\"normal\",\"text\":\"O indicativo CS25FB pretende chamar a atenção de radioamadores para este marco, contribuindo simbolicamente para a visibilidade da importância da conservação da natureza e da biodiversidade em Portugal.\",\"type\":\"text\",\"style\":\"\",\"detail\":0,\"format\":0,\"version\":1}],\"direction\":null,\"textStyle\":\"\",\"textFormat\":0},{\"type\":\"paragraph\",\"format\":\"start\",\"indent\":0,\"version\":1,\"children\":[{\"mode\":\"normal\",\"text\":\"73 de CS25FB\",\"type\":\"text\",\"style\":\"\",\"detail\":0,\"format\":0,\"version\":1}],\"direction\":null,\"textStyle\":\"\",\"textFormat\":0},{\"type\":\"paragraph\",\"format\":\"start\",\"indent\":0,\"version\":1,\"children\":[{\"mode\":\"normal\",\"text\":\"QSL via Bureau, ou Directo após donativo para Faia Brava - ver IBAN no site \",\"type\":\"text\",\"style\":\"\",\"detail\":0,\"format\":0,\"version\":1},{\"id\":\"693c1bfbb81ac1a0996b0134\",\"type\":\"link\",\"fields\":{\"url\":\"https://l.facebook.com/l.php?u=https%3A%2F%2Fwww.faiabrava.com%2F%3Ffbclid%3DIwZXh0bgNhZW0CMTAAYnJpZBEwdnh6MmtiNThVU21ZV3lWc3NydGMGYXBwX2lkEDIyMjAzOTE3ODgyMDA4OTIAAR7j4jg7YTfHunWiXnsEwGBUe6uA6f0tBfGuqeuNrTEzVqa9PJYCNPgSANW6QQ_aem_d-ub2voXB2FG-z-Kiys4wA\u0026h=AT0YoqR0jAZnpev3pklCtK6mMetDRCHYf9TlnUgx34RcM1sf46py5h3LCGx1pRhAw1wrJPxETP1Pgzl0dFGuQPRESe7Fs4yaA8laxkqgbiZBSnRG_H_Mq9rNB1x4\u0026__tn__=-UK-R\u0026c[0]=AT2Ew9PFSRyw2f8FBjaoTPKMVg78bgw5CivBYZIOewym8SIuD9_PfysSs9_OA0nnHJNGS0SwiyydnbCdXAqGqcjJM_FPtwrKY-BHXXMJYAmFKJBB7JbqIbCVYdZmn1S4SLCW_aRi0sTDNJEwbF4kRpW6mNVpXkrg_pIqReEOLLYmOFPcYN8\",\"newTab\":true,\"linkType\":\"custom\"},\"format\":\"\",\"indent\":0,\"version\":3,\"children\":[{\"id\":\"693c1bfbb81ac1a0996b0135\",\"type\":\"link\",\"fields\":{\"url\":\"https://l.facebook.com/l.php?u=https%3A%2F%2Fwww.faiabrava.com%2F%3Ffbclid%3DIwZXh0bgNhZW0CMTAAYnJpZBEwdnh6MmtiNThVU21ZV3lWc3NydGMGYXBwX2lkEDIyMjAzOTE3ODgyMDA4OTIAAR4gELBFn-FvuYhtzUHfy1QAaEPTBWtD2taSCDoad_yA_DkxdcD70pUC00UiMw_aem_hdX5AJ8PoCKF1tWY-mDH7A\u0026h=AT0YoqR0jAZnpev3pklCtK6mMetDRCHYf9Tl
